// ===================================================================

function useApi(webAppUrl, authToken) {
  const callGet = useCallback(async (action, params = {}) => {
    const query = new URLSearchParams({
      action,
      authToken,
      ...params
    }).toString();
    const res = await fetch(`${webAppUrl}?${query}`);
    if (!res.ok) throw new Error('Gagal menghubungi server');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  }, [webAppUrl, authToken]);
  const callPost = useCallback(async (action, data = {}) => {
    const res = await fetch(webAppUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify({
        action,
        data,
        authToken
      })
    });
    if (!res.ok) throw new Error('Gagal menghubungi server');
    const result = await res.json();
    if (result.error) throw new Error(result.error);
    return result;
  }, [webAppUrl, authToken]);
  return useMemo(() => ({
    callGet,
    callPost
  }), [callGet, callPost]);
}

          h('td', { style: styles.td }, paymentMethodLabel(p.wallet)),
          h('td', { style: styles.td }, p.notes || '-'),
          h('td', { style: styles.td }, formatRupiah(p.amount)),
          h('td', { style: styles.td }, canEdit ? h('div', { style: styles.tableActions },
            h('button', { onClick: () => startEditPurchase(p), style: styles.iconBtn, title: 'Edit pembelian' }, h(Edit2, { size: 14 })),
            h('button', { onClick: () => removePurchase(p), style: styles.iconBtnDanger, title: 'Hapus pembelian' }, h(Trash2, { size: 14 }))
          ) : '-')
        ))
      )
    ))
  );
}
